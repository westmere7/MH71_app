name: Supabase keep-alive

# Supabase free projects auto-pause after 7 days with no API calls. This pings
# the REST API once a day so the project never goes idle long enough to pause.
# A paused project must still be un-paused once from the dashboard; this only
# PREVENTS future pauses.

on:
  schedule:
    - cron: "17 3 * * *" # every day at 03:17 UTC
  workflow_dispatch: {} # allow manual run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/settings?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          echo "Supabase responded: $code"
          # any HTTP response means the project served a request (stays active)
          if [ -z "$code" ] || [ "$code" = "000" ]; then
            echo "No response from Supabase"; exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
